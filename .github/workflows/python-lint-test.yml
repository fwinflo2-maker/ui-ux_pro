name: Python Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.10'

      - name: Install lint and test tools
        run: pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop on Python syntax errors or undefined names
          flake8 src/ .claude/skills/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only (non-blocking)
          flake8 src/ .claude/skills/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: |
          pytest .claude/skills/ui-styling/scripts/tests/ -v 2>/dev/null || true
          pytest src/ -v 2>/dev/null || true

  unicode-safety:
    name: Unicode Safety Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan skill files for hidden Unicode characters
        run: python3 scripts/check-unicode.py .claude/skills/
